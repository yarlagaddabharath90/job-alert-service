name: daily-job-alert

on:
  schedule:
    # GitHub cron is UTC. 13:00 UTC ≈ 8:00 AM US Central (CDT). Adjust for your zone/DST.
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Build
        run: ./gradlew bootJar --no-daemon -q
      - name: Run once and exit
        # Runs the pipeline immediately, then shuts down (no server kept alive).
        run: |
          java -jar build/libs/job-alert-service-1.0.0.jar \
            --spring.main.web-application-type=none \
            --jobalert.run-on-startup=true
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          EMAIL_USER: yarlagaddabharath90@gmail.com
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: mtadepalli98@gmail.com
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
